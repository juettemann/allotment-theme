<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 560" role="img" aria-labelledby="ttl desc">
	<title id="ttl">The allotment year at a glance</title>
	<desc id="desc">A twelve-segment ring chart showing the busy months on an allotment. Darker green indicates a busier month for sowing, planting and harvesting. July is the busiest single month; January and December are the quietest.</desc>

	<rect width="500" height="560" fill="#fdfcfb"/>

	<!-- 12 segments. Activity level encoded by fill colour. -->
	<g stroke="#fdfcfb" stroke-width="2">
		<!-- Jan: quiet -->
		<path d="M 250 50 A 200 200 0 0 1 350 76.8 L 300 163.4 A 100 100 0 0 0 250 150 Z" fill="#f5f3f0"/>
		<!-- Feb: low -->
		<path d="M 350 76.8 A 200 200 0 0 1 423.2 150 L 336.6 200 A 100 100 0 0 0 300 163.4 Z" fill="#d4cdc1"/>
		<!-- Mar: medium -->
		<path d="M 423.2 150 A 200 200 0 0 1 450 250 L 350 250 A 100 100 0 0 0 336.6 200 Z" fill="#8fac93"/>
		<!-- Apr: medium -->
		<path d="M 450 250 A 200 200 0 0 1 423.2 350 L 336.6 300 A 100 100 0 0 0 350 250 Z" fill="#8fac93"/>
		<!-- May: high -->
		<path d="M 423.2 350 A 200 200 0 0 1 350 423.2 L 300 336.6 A 100 100 0 0 0 336.6 300 Z" fill="#6b8e6f"/>
		<!-- Jun: high -->
		<path d="M 350 423.2 A 200 200 0 0 1 250 450 L 250 350 A 100 100 0 0 0 300 336.6 Z" fill="#6b8e6f"/>
		<!-- Jul: peak -->
		<path d="M 250 450 A 200 200 0 0 1 150 423.2 L 200 336.6 A 100 100 0 0 0 250 350 Z" fill="#5a7a5e"/>
		<!-- Aug: high -->
		<path d="M 150 423.2 A 200 200 0 0 1 76.8 350 L 163.4 300 A 100 100 0 0 0 200 336.6 Z" fill="#6b8e6f"/>
		<!-- Sep: high -->
		<path d="M 76.8 350 A 200 200 0 0 1 50 250 L 150 250 A 100 100 0 0 0 163.4 300 Z" fill="#6b8e6f"/>
		<!-- Oct: medium -->
		<path d="M 50 250 A 200 200 0 0 1 76.8 150 L 163.4 200 A 100 100 0 0 0 150 250 Z" fill="#8fac93"/>
		<!-- Nov: low -->
		<path d="M 76.8 150 A 200 200 0 0 1 150 76.8 L 200 163.4 A 100 100 0 0 0 163.4 200 Z" fill="#d4cdc1"/>
		<!-- Dec: quiet -->
		<path d="M 150 76.8 A 200 200 0 0 1 250 50 L 250 150 A 100 100 0 0 0 200 163.4 Z" fill="#f5f3f0"/>
	</g>

	<!-- Month labels (dark for light segments, white for dark) -->
	<g font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle">
		<text x="289" y="110" fill="#3d3428">Jan</text>
		<text x="356" y="149" fill="#3d3428">Feb</text>
		<text x="395" y="216" fill="#3d3428">Mar</text>
		<text x="395" y="294" fill="#3d3428">Apr</text>
		<text x="356" y="361" fill="#fdfcfb">May</text>
		<text x="289" y="400" fill="#fdfcfb">Jun</text>
		<text x="211" y="400" fill="#fdfcfb">Jul</text>
		<text x="144" y="361" fill="#fdfcfb">Aug</text>
		<text x="105" y="294" fill="#fdfcfb">Sep</text>
		<text x="105" y="216" fill="#3d3428">Oct</text>
		<text x="144" y="149" fill="#3d3428">Nov</text>
		<text x="211" y="110" fill="#3d3428">Dec</text>
	</g>

	<!-- Centre label -->
	<circle cx="250" cy="250" r="95" fill="#fdfcfb"/>
	<text x="250" y="235" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#3d3428">The Allotment</text>
	<text x="250" y="258" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#3d3428">Year</text>
	<text x="250" y="285" text-anchor="middle" font-family="sans-serif" font-size="11" font-style="italic" fill="#5c5347">at a glance</text>

	<!-- Legend -->
	<g transform="translate(75 490)">
		<text x="0" y="0" font-family="sans-serif" font-size="12" fill="#3d3428">Quiet</text>
		<rect x="44" y="-12" width="22" height="16" fill="#f5f3f0" stroke="#c3c4c7" stroke-width="0.5"/>
		<rect x="68" y="-12" width="22" height="16" fill="#d4cdc1"/>
		<rect x="92" y="-12" width="22" height="16" fill="#8fac93"/>
		<rect x="116" y="-12" width="22" height="16" fill="#6b8e6f"/>
		<rect x="140" y="-12" width="22" height="16" fill="#5a7a5e"/>
		<text x="170" y="0" font-family="sans-serif" font-size="12" fill="#3d3428">Busy</text>
	</g>
	<text x="250" y="535" text-anchor="middle" font-family="sans-serif" font-size="11" font-style="italic" fill="#5c5347">Sowing, planting and harvesting combined</text>
</svg>
