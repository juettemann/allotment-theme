<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" role="img" aria-labelledby="ttl desc">
	<title id="ttl">Greens and browns in roughly equal volume</title>
	<desc id="desc">Two side-by-side bins of equal height showing examples of green compost material (grass clippings, peelings, fresh weeds) and brown compost material (cardboard, dry leaves, straw). The bacteria that do the work need both in roughly equal proportions.</desc>

	<rect width="700" height="400" fill="#fdfcfb"/>

	<text x="350" y="35" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="600" fill="#3d3428">Roughly equal volume of greens and browns</text>
	<text x="350" y="56" text-anchor="middle" font-family="sans-serif" font-size="12" font-style="italic" fill="#5c5347">The bacteria need nitrogen (greens) and carbon (browns) in balance</text>

	<!-- Greens bin -->
	<g>
		<!-- Bin outline -->
		<rect x="100" y="100" width="220" height="220" fill="none" stroke="#5a4a3a" stroke-width="2.5" rx="4"/>
		<!-- Header band -->
		<rect x="100" y="100" width="220" height="36" fill="#6b8e6f" rx="4"/>
		<text x="210" y="125" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#fdfcfb">GREENS</text>
		<text x="210" y="155" text-anchor="middle" font-family="sans-serif" font-size="11" font-style="italic" fill="#5c5347">fresh, wet, nitrogen-rich</text>

		<!-- Example items as little icons + labels -->
		<!-- Grass -->
		<g transform="translate(125 180)">
			<line x1="0" y1="0" x2="-2" y2="-10" stroke="#6b8e6f" stroke-width="1.5"/>
			<line x1="0" y1="0" x2="0" y2="-12" stroke="#6b8e6f" stroke-width="1.5"/>
			<line x1="0" y1="0" x2="3" y2="-10" stroke="#6b8e6f" stroke-width="1.5"/>
			<line x1="6" y1="0" x2="4" y2="-10" stroke="#6b8e6f" stroke-width="1.5"/>
			<line x1="6" y1="0" x2="9" y2="-12" stroke="#6b8e6f" stroke-width="1.5"/>
		</g>
		<text x="155" y="180" font-family="sans-serif" font-size="13" fill="#3d3428">Grass clippings</text>

		<!-- Vegetable peel -->
		<g transform="translate(125 210)">
			<path d="M -5 -5 Q 0 -10 5 -5 Q 8 0 5 5 Q 0 10 -5 5 Q -8 0 -5 -5 Z" fill="#e8a64e" opacity="0.8"/>
		</g>
		<text x="155" y="215" font-family="sans-serif" font-size="13" fill="#3d3428">Vegetable peelings</text>

		<!-- Fresh weeds -->
		<g transform="translate(125 240)">
			<ellipse cx="0" cy="0" rx="6" ry="4" fill="#6b8e6f" transform="rotate(-30)"/>
			<ellipse cx="6" cy="-2" rx="6" ry="4" fill="#8fac93" transform="rotate(20)"/>
		</g>
		<text x="155" y="245" font-family="sans-serif" font-size="13" fill="#3d3428">Fresh weeds (no seeds)</text>

		<!-- Coffee grounds -->
		<g transform="translate(125 270)">
			<rect x="-6" y="-4" width="12" height="8" fill="#5a4a3a" rx="2"/>
			<circle cx="0" cy="-1" r="1" fill="#3d3428"/>
			<circle cx="3" cy="2" r="1" fill="#3d3428"/>
			<circle cx="-3" cy="2" r="1" fill="#3d3428"/>
		</g>
		<text x="155" y="275" font-family="sans-serif" font-size="13" fill="#3d3428">Coffee grounds</text>

		<!-- Soft prunings -->
		<g transform="translate(125 300)">
			<line x1="-6" y1="0" x2="6" y2="-3" stroke="#6b8e6f" stroke-width="2"/>
			<ellipse cx="-3" cy="-2" rx="3" ry="2" fill="#8fac93"/>
			<ellipse cx="3" cy="-4" rx="3" ry="2" fill="#8fac93"/>
		</g>
		<text x="155" y="305" font-family="sans-serif" font-size="13" fill="#3d3428">Soft prunings</text>
	</g>

	<!-- Plus sign -->
	<g transform="translate(350 210)">
		<rect x="-3" y="-18" width="6" height="36" fill="#3d3428" rx="2"/>
		<rect x="-18" y="-3" width="36" height="6" fill="#3d3428" rx="2"/>
	</g>

	<!-- Browns bin -->
	<g>
		<rect x="380" y="100" width="220" height="220" fill="none" stroke="#5a4a3a" stroke-width="2.5" rx="4"/>
		<rect x="380" y="100" width="220" height="36" fill="#8B6F47" rx="4"/>
		<text x="490" y="125" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#fdfcfb">BROWNS</text>
		<text x="490" y="155" text-anchor="middle" font-family="sans-serif" font-size="11" font-style="italic" fill="#5c5347">dry, woody, carbon-rich</text>

		<!-- Cardboard -->
		<g transform="translate(405 180)">
			<rect x="-7" y="-5" width="14" height="10" fill="#c8a87a" stroke="#5a4a3a" stroke-width="0.7"/>
			<line x1="-7" y1="-1" x2="7" y2="-1" stroke="#5a4a3a" stroke-width="0.5"/>
			<line x1="-7" y1="2" x2="7" y2="2" stroke="#5a4a3a" stroke-width="0.5"/>
		</g>
		<text x="435" y="183" font-family="sans-serif" font-size="13" fill="#3d3428">Cardboard (torn up)</text>

		<!-- Dry leaves -->
		<g transform="translate(405 210)">
			<path d="M 0 -6 Q 5 -3 5 2 Q 3 6 0 6 Q -3 6 -5 2 Q -5 -3 0 -6 Z" fill="#8B6F47"/>
			<line x1="0" y1="-6" x2="0" y2="6" stroke="#5a4a3a" stroke-width="0.5"/>
		</g>
		<text x="435" y="215" font-family="sans-serif" font-size="13" fill="#3d3428">Dry autumn leaves</text>

		<!-- Straw -->
		<g transform="translate(405 240)">
			<line x1="-7" y1="-3" x2="7" y2="-3" stroke="#e8a64e" stroke-width="1.5"/>
			<line x1="-7" y1="0" x2="7" y2="0" stroke="#c8a87a" stroke-width="1.5"/>
			<line x1="-7" y1="3" x2="7" y2="3" stroke="#e8a64e" stroke-width="1.5"/>
		</g>
		<text x="435" y="245" font-family="sans-serif" font-size="13" fill="#3d3428">Straw</text>

		<!-- Shredded paper -->
		<g transform="translate(405 270)">
			<line x1="-7" y1="-4" x2="7" y2="-4" stroke="#c3c4c7" stroke-width="1"/>
			<line x1="-7" y1="-1" x2="7" y2="-1" stroke="#c3c4c7" stroke-width="1"/>
			<line x1="-7" y1="2" x2="7" y2="2" stroke="#c3c4c7" stroke-width="1"/>
			<line x1="-7" y1="5" x2="7" y2="5" stroke="#c3c4c7" stroke-width="1"/>
		</g>
		<text x="435" y="275" font-family="sans-serif" font-size="13" fill="#3d3428">Shredded paper</text>

		<!-- Woody stems -->
		<g transform="translate(405 300)">
			<rect x="-7" y="-2" width="14" height="3" fill="#8B6F47"/>
			<rect x="-5" y="2" width="12" height="3" fill="#5a4a3a"/>
		</g>
		<text x="435" y="305" font-family="sans-serif" font-size="13" fill="#3d3428">Woody stems &amp; twigs</text>
	</g>

	<!-- Bottom guidance -->
	<text x="350" y="360" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3d3428">
		<tspan font-weight="600">Too smelly?</tspan> Add browns.
		<tspan font-weight="600" dx="20">Nothing happening?</tspan> Add greens and water.
	</text>
</svg>
