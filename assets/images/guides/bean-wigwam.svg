<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" role="img" aria-labelledby="ttl desc">
	<title id="ttl">A runner bean wigwam</title>
	<desc id="desc">Six bamboo canes pushed into the ground in a circle and lashed together at the top form a tepee shape about two metres tall, with bean plants climbing each cane.</desc>

	<rect width="400" height="520" fill="#fdfcfb"/>

	<!-- Ground -->
	<ellipse cx="200" cy="455" rx="185" ry="15" fill="#8B6F47" opacity="0.55"/>
	<ellipse cx="200" cy="455" rx="185" ry="15" fill="none" stroke="#3d3428" stroke-width="1.5"/>

	<!-- Canes (in roughly perspective arrangement, all meeting at apex 200,80) -->
	<line x1="200" y1="80" x2="55" y2="450" stroke="#c8a87a" stroke-width="5" stroke-linecap="round"/>
	<line x1="200" y1="80" x2="105" y2="455" stroke="#c8a87a" stroke-width="5" stroke-linecap="round"/>
	<line x1="200" y1="80" x2="175" y2="458" stroke="#c8a87a" stroke-width="5" stroke-linecap="round"/>
	<line x1="200" y1="80" x2="225" y2="458" stroke="#c8a87a" stroke-width="5" stroke-linecap="round"/>
	<line x1="200" y1="80" x2="295" y2="455" stroke="#c8a87a" stroke-width="5" stroke-linecap="round"/>
	<line x1="200" y1="80" x2="345" y2="450" stroke="#c8a87a" stroke-width="5" stroke-linecap="round"/>

	<!-- Lash at top -->
	<ellipse cx="200" cy="80" rx="14" ry="7" fill="#3d3428"/>
	<line x1="200" y1="80" x2="265" y2="68" stroke="#3d3428" stroke-width="1.5"/>
	<text x="270" y="72" font-family="sans-serif" font-size="13" fill="#3d3428">Lash with twine</text>

	<!-- Bean foliage along canes (front-facing canes have more visible leaves) -->
	<g fill="#6b8e6f">
		<!-- Left outer cane -->
		<ellipse cx="170" cy="170" rx="14" ry="9"/>
		<ellipse cx="150" cy="225" rx="16" ry="10"/>
		<ellipse cx="125" cy="290" rx="18" ry="11"/>
		<ellipse cx="95" cy="355" rx="17" ry="11"/>
		<ellipse cx="70" cy="420" rx="14" ry="9"/>
		<!-- Left inner -->
		<ellipse cx="183" cy="180" rx="14" ry="9"/>
		<ellipse cx="170" cy="250" rx="16" ry="10"/>
		<ellipse cx="153" cy="320" rx="18" ry="11"/>
		<ellipse cx="135" cy="390" rx="16" ry="10"/>
		<ellipse cx="118" cy="445" rx="13" ry="8"/>
		<!-- Right inner -->
		<ellipse cx="217" cy="180" rx="14" ry="9"/>
		<ellipse cx="230" cy="250" rx="16" ry="10"/>
		<ellipse cx="247" cy="320" rx="18" ry="11"/>
		<ellipse cx="265" cy="390" rx="16" ry="10"/>
		<ellipse cx="282" cy="445" rx="13" ry="8"/>
		<!-- Right outer cane -->
		<ellipse cx="230" cy="170" rx="14" ry="9"/>
		<ellipse cx="250" cy="225" rx="16" ry="10"/>
		<ellipse cx="275" cy="290" rx="18" ry="11"/>
		<ellipse cx="305" cy="355" rx="17" ry="11"/>
		<ellipse cx="330" cy="420" rx="14" ry="9"/>
	</g>

	<!-- A few lighter top leaves -->
	<g fill="#8fac93">
		<ellipse cx="195" cy="130" rx="11" ry="7"/>
		<ellipse cx="207" cy="115" rx="10" ry="6"/>
		<ellipse cx="185" cy="100" rx="9" ry="6"/>
	</g>

	<!-- Red runner-bean flowers -->
	<g fill="#c86f4a">
		<circle cx="178" cy="215" r="3.5"/>
		<circle cx="222" cy="215" r="3.5"/>
		<circle cx="153" cy="285" r="3.5"/>
		<circle cx="247" cy="285" r="3.5"/>
		<circle cx="125" cy="360" r="3"/>
		<circle cx="275" cy="360" r="3"/>
		<circle cx="200" cy="195" r="3"/>
	</g>

	<!-- A couple of green bean pods hanging -->
	<g fill="#5a7a5e">
		<rect x="178" y="260" width="3" height="22" rx="1.5"/>
		<rect x="219" y="260" width="3" height="22" rx="1.5"/>
		<rect x="160" y="330" width="3" height="25" rx="1.5"/>
		<rect x="237" y="330" width="3" height="25" rx="1.5"/>
	</g>

	<!-- Width dimension -->
	<line x1="55" y1="490" x2="345" y2="490" stroke="#3d3428" stroke-width="1.5"/>
	<line x1="55" y1="484" x2="55" y2="496" stroke="#3d3428" stroke-width="1.5"/>
	<line x1="345" y1="484" x2="345" y2="496" stroke="#3d3428" stroke-width="1.5"/>
	<text x="200" y="510" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#3d3428">2 to 2.5 m across</text>

	<!-- Height dimension on right -->
	<line x1="375" y1="80" x2="375" y2="450" stroke="#3d3428" stroke-width="1.5" stroke-dasharray="4,3"/>
	<line x1="370" y1="80" x2="380" y2="80" stroke="#3d3428" stroke-width="1.5"/>
	<line x1="370" y1="450" x2="380" y2="450" stroke="#3d3428" stroke-width="1.5"/>
	<text x="385" y="270" font-family="sans-serif" font-size="12" fill="#3d3428" transform="rotate(90 385 270)">about 2 m tall</text>
</svg>
