<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Lush community garden placeholder">
	<defs>
		<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#cfe1d2"/>
			<stop offset="100%" stop-color="#f5efe3"/>
		</linearGradient>
		<linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#6b8e6f"/>
			<stop offset="100%" stop-color="#3d6243"/>
		</linearGradient>
		<radialGradient id="sun" cx="0.8" cy="0.2" r="0.4">
			<stop offset="0%" stop-color="#e8a64e" stop-opacity="0.55"/>
			<stop offset="100%" stop-color="#e8a64e" stop-opacity="0"/>
		</radialGradient>
		<pattern id="rows" x="0" y="0" width="220" height="44" patternUnits="userSpaceOnUse" patternTransform="skewX(-12)">
			<rect width="220" height="44" fill="#4d6b4f"/>
			<rect y="20" width="220" height="6" fill="#3d5a3f"/>
			<rect y="38" width="220" height="6" fill="#3d5a3f"/>
		</pattern>
	</defs>

	<rect width="1600" height="1200" fill="url(#sky)"/>
	<rect width="1600" height="1200" fill="url(#sun)"/>

	<!-- background trees -->
	<g fill="#7ea582" opacity="0.7">
		<ellipse cx="180" cy="640" rx="220" ry="120"/>
		<ellipse cx="520" cy="610" rx="260" ry="140"/>
		<ellipse cx="900" cy="640" rx="240" ry="130"/>
		<ellipse cx="1260" cy="620" rx="280" ry="150"/>
		<ellipse cx="1520" cy="640" rx="180" ry="120"/>
	</g>
	<g fill="#5a7a5e" opacity="0.85">
		<ellipse cx="340" cy="680" rx="200" ry="110"/>
		<ellipse cx="780" cy="690" rx="240" ry="120"/>
		<ellipse cx="1180" cy="680" rx="220" ry="120"/>
		<ellipse cx="1480" cy="700" rx="220" ry="120"/>
	</g>

	<!-- ground -->
	<rect y="720" width="1600" height="480" fill="url(#ground)"/>
	<rect y="720" width="1600" height="480" fill="url(#rows)" opacity="0.55"/>

	<!-- plant clusters -->
	<g fill="#8fac93">
		<circle cx="200" cy="800" r="38"/>
		<circle cx="240" cy="830" r="28"/>
		<circle cx="180" cy="850" r="30"/>
		<circle cx="560" cy="820" r="46"/>
		<circle cx="610" cy="850" r="34"/>
		<circle cx="540" cy="870" r="32"/>
		<circle cx="940" cy="800" r="44"/>
		<circle cx="990" cy="830" r="32"/>
		<circle cx="930" cy="860" r="36"/>
		<circle cx="1320" cy="810" r="40"/>
		<circle cx="1370" cy="840" r="30"/>
		<circle cx="1290" cy="870" r="34"/>
	</g>

	<!-- accent flowers -->
	<g>
		<g transform="translate(420 900)">
			<circle r="12" fill="#c86f4a"/>
			<circle r="5" fill="#3d3428"/>
		</g>
		<g transform="translate(760 940)">
			<circle r="12" fill="#e8a64e"/>
			<circle r="5" fill="#3d3428"/>
		</g>
		<g transform="translate(1100 920)">
			<circle r="12" fill="#c86f4a"/>
			<circle r="5" fill="#3d3428"/>
		</g>
		<g transform="translate(1440 940)">
			<circle r="12" fill="#e8a64e"/>
			<circle r="5" fill="#3d3428"/>
		</g>
	</g>

	<!-- foreground sprout-shed silhouette -->
	<g fill="#3d3428" opacity="0.85">
		<rect x="1080" y="780" width="180" height="120"/>
		<polygon points="1060,780 1280,780 1170,720"/>
		<rect x="1130" y="820" width="40" height="60" fill="#5a7a5e"/>
	</g>

	<!-- ground horizon line -->
	<line x1="0" y1="720" x2="1600" y2="720" stroke="#3d3428" stroke-opacity="0.08" stroke-width="2"/>
</svg>
